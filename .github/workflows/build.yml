name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. جلب المستودع
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. فك ضغط ملف التطبيق
      - name: Unzip Project Files
        run: |
          unzip mobily-pro.zip -d project_files
          echo "==== تم فك الضغط بنجاح ===="

      # 3. إعداد الجافا وتفعيل الكاش لتفادي تحميل الحزم من الصفر
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      # 4. بناء الـ APK وتخطي قيود تعارض أداة KSP مع الذاكرة السحابية
      - name: Build Debug APK
        run: |
          cd project_files
          chmod +x gradlew || true
          
          # إجبار الكومبيلر على استخدام إعدادات ذاكرة منخفضة تناسب بيئة KSP
          ./gradlew assembleDebug --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx2048m -XX:MaxMetaspaceSize=512m -Dkotlin.daemon.jvmoptions=-Xmx1024m" \
            -Dkotlin.compiler.execution.strategy="in-process" || \
          gradle assembleDebug --stacktrace
          
      # 5. استخراج ملف الـ APK النهائي للتحميل
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GoldenPhone-App
          path: project_files/app/build/outputs/apk/debug/app-debug.apk
